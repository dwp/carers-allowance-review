# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/user/application_security/sast/#available-cicd-variables
# Dependency Scanning customization: https://docs.gitlab.com/user/application_security/dependency_scanning/dependency_scanning_sbom/#customizing-analyzer-behavior
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure/
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ci/variables/#cicd-variable-precedence
stages:
- test
- publish
- dependency_scanning
- secret-detection
sast:
  stage: test

publish_package:
  stage: publish
  image: node:20
  script:
    - echo "@dwp-govuk:registry=${PACKAGE_REGISTRY_URL}" > ~/.npmrc
    - echo "${PACKAGE_REGISTRY_URL}:_authToken=${NPM_TOKEN}" >> ~/.npmrc
    - npm ci
    - npm publish --registry "${PACKAGE_REGISTRY_URL}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never

include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Dependency-Scanning.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml
variables:
  SECRET_DETECTION_ENABLED: 'true'
  PACKAGE_REGISTRY_URL: "https://gitlab.com/api/v4/groups/dwp%2Fuser-centred-design/-/packages/npm/"
secret_detection:
  stage: secret-detection


install-dependencies:
  image: node:18
  stage: build
  script:
    - npm install